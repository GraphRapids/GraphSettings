services:
  graph-settings:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GRAPH_SETTINGS_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
